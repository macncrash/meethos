<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>meethos · earth3</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="stage"></canvas>

    <!-- Top-left: scale breadcrumb (Galaxy ▸ Solar System ▸ Earth) -->
    <nav id="breadcrumb" aria-label="scale"></nav>

    <!-- Top-right: focus / info readout -->
    <aside id="inspector" hidden></aside>

    <!-- Left: route planner (shift-click bodies to add waypoints) -->
    <div id="routepanel" hidden>
      <div class="rp-head"><span>◇ Route</span><button id="route-clear" title="Clear route">✕</button></div>
      <ol id="route-list"></ol>
      <div class="rp-speed">
        <input id="route-speed" type="range" min="0" max="9" value="7" aria-label="Travel speed" />
        <span id="route-speed-label">100c</span>
      </div>
      <div id="route-stats">—</div>
      <button id="route-fly">▶ Fly the route</button>
    </div>

    <!-- Top-center: cross-scale event toast -->
    <div id="toast" hidden></div>

    <!-- Defense game: health + score bar -->
    <div id="gamebar" hidden>
      <div class="health-track"><div id="health-fill"></div></div>
      <div id="game-stats"></div>
    </div>

    <!-- Inbound-comet threat warning + deflect action -->
    <div id="warning" hidden>
      <span class="pulse">☄ INBOUND</span>
      <span id="warning-dist">— AU</span>
      <button id="deflect-btn" title="Deflect the comet (press d)">⟲ Deflect</button>
    </div>

    <!-- Defense game-over overlay -->
    <div id="gameover" hidden>
      <div class="panel">
        <h2>Civilization Lost</h2>
        <p id="gameover-text"></p>
        <button id="restart-btn">⟳ Defend again</button>
      </div>
    </div>

    <!-- Bottom-center: time + speed controls -->
    <footer id="hud">
      <div id="clock">
        <span id="era" class="era">—</span>
        <span id="stardate" class="stardate">—</span>
      </div>
      <div id="transport">
        <button data-rate="pause" title="Pause">❚❚</button>
        <button data-rate="slower" title="Slower">«</button>
        <span id="rate-label">1×</span>
        <button data-rate="faster" title="Faster">»</button>
      </div>
      <button id="bigbang-btn" title="Rewind to the Big Bang and watch the cosmic web form" hidden>✦ Big Bang</button>
      <button id="merger-btn" title="Fast-forward the Milky Way × Andromeda collision (~4.5 Gyr)" hidden>⟳ Andromeda Merger</button>
      <button id="comet-btn" title="Send a comet at Earth (press c)">☄ Comet</button>
      <button id="defense-btn" title="Defense — survive a comet siege; keep Earth's civilization alive">🛡 Defend Earth</button>
      <div id="stats"></div>
    </footer>

    <!-- Bottom-left: label density (0 = hover only … max = everything) -->
    <div id="labelctl">
      <span class="lc-title">Labels</span>
      <input id="label-slider" type="range" min="0" max="6" step="1" value="3" aria-label="Label density" />
      <span id="label-level">Normal</span>
    </div>

    <div id="hint">scroll to zoom · drag to orbit · double-click a body to dive in · hover to name · <b>c</b> comet · <b>v</b> view from · click or <b>d</b> to deflect</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
